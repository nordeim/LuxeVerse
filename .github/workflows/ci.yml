name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Type Check
        run: pnpm turbo typecheck

      - name: Lint
        run: pnpm turbo lint

      - name: Run Tests
        run: pnpm turbo test

      - name: Build
        run: pnpm turbo build

      - name: Validate Colors
        run: |
          if grep -rEn 'text-\[#[0-9A-Fa-f]{3,6}\]|bg-\[#[0-9A-Fa-f]{3,6}\]|border-\[#[0-9A-Fa-f]{3,6}\]' packages/ apps/; then
            echo "Raw hex colors found in className. Use @theme tokens instead."
            exit 1
          fi

      - name: Validate Deprecated TW v3
        run: |
          if grep -rEn 'bg-gradient-to-(r|l|t|b)|outline-none[^-]|flex-shrink-0' packages/ apps/; then
            echo "Deprecated Tailwind v3 utilities found. Update to v4 names."
            exit 1
          fi
